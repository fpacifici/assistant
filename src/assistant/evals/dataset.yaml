- inputs:
    question: "What are the responsibilities of the main component of apache Flink?"
  outputs:
    answer: |
      - JobManager
        - Assign work to task managers when it sees enough slots
        - Coordinates checkpoint management
      - ResourceManager
        - Keeps track of idle slots to tell the JobManager to provide them
      - TaskManagers
        - Provides slot
        - Can deploy multiple taskManager with one slot in a Pod to isolate resource usage
      - Dispatcher
        - Receives job and starts JobManagers
    notes_ids:
      - 773ae705-d769-fce8-6826-0453c3693a54
    topics:
      - streaming
    notebooks:
